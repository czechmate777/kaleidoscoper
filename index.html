<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <title>Kaleidoscoper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Hamburger Menu -->
    <div id="menuIcon">&#9776;</div>

    <!-- Collapsible Control Panel -->
    <div id="controlPanel">
        <button id="saveBtn">Save</button>
        <button id="undoBtn">↶</button>
        <button id="redoBtn">↷</button>
        <button id="clearBtn">Clear</button>

        <div class="control-group">
            <label for="segmentSlider">Segments: <span id="segmentCount">8</span></label>
            <input type="range" id="segmentSlider" min="2" max="24" value="8" step="2">
        </div>

        <div class="control-group">
            <label for="thicknessSlider">Thickness: <span id="thicknessValue">3</span></label>
            <input type="range" id="thicknessSlider" min="1" max="20" value="3" step="1">
        </div>
        
        <div class="control-group">
            <label>
                <input type="checkbox" id="mirrorToggle" checked>
                Mirror
            </label>
        </div>

        <div class="control-group">
            <label>Color</label>
            <div class="color-picker">
                <button class="swatch active" data-color="#00e5ff" style="background: #00e5ff;"></button>
                <button class="swatch" data-color="#ff0055" style="background: #ff0055;"></button>
                <button class="swatch" data-color="#ffaa00" style="background: #ffaa00;"></button>
                <button class="swatch" data-color="#00ffaa" style="background: #00ffaa;"></button>
                <button class="swatch" data-color="#ffffff" style="background: #ffffff;"></button>
            </div>

            <div id="pickerContainer" class="picker-container hidden">
                <div class="wheel-wrapper">
                    <canvas id="wheelCanvas" width="150" height="150"></canvas>
                    <div id="wheelMarker" class="wheel-marker"></div>
                </div>
                <div class="brightness-group">
                    <label for="brightnessSlider">Brightness: <span id="brightnessValue">100%</span></label>
                    <input type="range" id="brightnessSlider" min="0" max="100" value="100">
                </div>
            </div>
        </div>
    </div>
    <canvas id="drawCanvas"></canvas>

    <script src="app.js"></script>
</body>

</html>
